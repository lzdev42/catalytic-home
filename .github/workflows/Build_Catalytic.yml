name: Build Catalytic

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0 or v1.0.0-dev.1)'
        required: true
        type: string

  repository_dispatch:
    types: [catalytic-release]

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  check-tag:
    name: Check if tag exists
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      ref: ${{ steps.check.outputs.ref }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check if tag exists in Catalytic repo
        id: check
        env:
          GH_TOKEN: ${{ secrets.CATALYTIC_PAT }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if gh api repos/lzdev42/catalytic/git/ref/tags/$VERSION --silent 2>/dev/null; then
            echo "Tag $VERSION exists, will checkout tag"
            echo "ref=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "Tag $VERSION does not exist, will checkout main branch"
            echo "ref=main" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: AppleSilicon
            rust-target: aarch64-apple-darwin
          - os: macos-15-intel
            platform: macos
            arch: Intel
            rust-target: x86_64-apple-darwin
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            arch: x64
            rust-target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            platform: windows
            arch: arm64
            rust-target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [check-tag]
    if: always() && (github.event_name == 'repository_dispatch' || needs.check-tag.result == 'success')
    steps:
      - name: Set build variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "ref=${{ needs.check-tag.outputs.ref }}" >> $GITHUB_OUTPUT
            echo "version=${{ needs.check-tag.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Checkout Catalytic Repo
        uses: actions/checkout@v6
        with:
          repository: lzdev42/catalytic
          token: ${{ secrets.CATALYTIC_PAT }}
          ref: ${{ steps.vars.outputs.ref }}
          fetch-depth: 0

      - name: Set version for main branch build
        if: steps.vars.outputs.ref == 'main'
        run: |
          echo "Building from main branch with version: ${{ steps.vars.outputs.version }}"
        shell: bash

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
          cache: 'gradle'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.rust-target }}

      - name: Setup Rust Toolchain for Windows ARM64
        if: matrix.platform == 'windows' && matrix.arch == 'arm64'
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc
          rustup toolchain install stable-aarch64-pc-windows-msvc
          rustup default stable-aarch64-pc-windows-msvc
          echo "Toolchain status:"
          rustup show
          rustc --version
          cargo --version

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget

      - name: Grant execute permission
        if: runner.os != 'Windows'
        run: chmod +x ./build_release.sh

      - name: Run Build Script (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          ./build_release.sh --output "${{ github.workspace }}/dist" --skip-sign

      - name: Run Build Script (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          ./build_release.sh --output "${{ github.workspace }}/dist" --skip-sign

      - name: Upload jpackage error log on failure
        if: failure() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: jpackage-error-log-windows-${{ matrix.arch }}
          path: catalyticui/composeApp/build/compose/logs/createReleaseDistributable/*.txt
          retention-days: 5

      - name: Package Windows ZIP
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/Catalytic `
            -DestinationPath dist/Catalytic-${{ matrix.arch }}.zip `
            -CompressionLevel Optimal `
            -Force

      - name: Upload Build Artifact (macOS/Linux)
        if: matrix.platform != 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: catalytic-${{ steps.vars.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.AppImage
          retention-days: 14

      - name: Upload Build Artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: catalytic-${{ steps.vars.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.zip
          retention-days: 14

  build-plugins:
    name: Build CatalyticKit Plugins
    runs-on: ubuntu-latest
    needs: [check-tag]
    if: always() && (github.event_name == 'repository_dispatch' || needs.check-tag.result == 'success')
    steps:
      - name: Set version
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ needs.check-tag.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Checkout CatalyticKit Repo
        uses: actions/checkout@v6
        with:
          repository: lzdev42/CatalyticKit
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build & Package CatalyticSerialPort
        run: |
          dotnet build CatalyticSerialPort/CatalyticSerialPort/CatalyticSerialPort.csproj -c Release
          OUTPUT=CatalyticSerialPort/CatalyticSerialPort/bin/Release/net10.0
          find "$OUTPUT" -name "*.pdb" -o -name "*.xml" -o -name "*.deps.json" -o -name "*.runtimeconfig.json" -o -name "*.runtimeconfig.dev.json" | xargs rm -f
          cd "$OUTPUT"
          zip -r "${{ github.workspace }}/CatalyticSerialPort-${{ steps.vars.outputs.version }}.zip" .

      - name: Build & Package CsvReporter
        run: |
          dotnet build CsvReporter/CsvReporter/CsvReporter.csproj -c Release
          OUTPUT=CsvReporter/CsvReporter/bin/Release/net10.0
          find "$OUTPUT" -name "*.pdb" -o -name "*.xml" -o -name "*.deps.json" -o -name "*.runtimeconfig.json" -o -name "*.runtimeconfig.dev.json" | xargs rm -f
          cd "$OUTPUT"
          zip -r "${{ github.workspace }}/CsvReporter-${{ steps.vars.outputs.version }}.zip" .

      - name: Build & Package SocketClient
        run: |
          dotnet build SocketClient/SocketClient/SocketClient.csproj -c Release
          OUTPUT=SocketClient/SocketClient/bin/Release/net10.0
          find "$OUTPUT" -name "*.pdb" -o -name "*.xml" -o -name "*.deps.json" -o -name "*.runtimeconfig.json" -o -name "*.runtimeconfig.dev.json" | xargs rm -f
          cd "$OUTPUT"
          zip -r "${{ github.workspace }}/SocketClient-${{ steps.vars.outputs.version }}.zip" .

      - name: Build & Package RemoteController
        run: |
          dotnet build RemoteController/RemoteController/RemoteController.csproj -c Release
          OUTPUT=RemoteController/RemoteController/bin/Release/net10.0
          find "$OUTPUT" -name "*.pdb" -o -name "*.xml" -o -name "*.deps.json" -o -name "*.runtimeconfig.json" -o -name "*.runtimeconfig.dev.json" | xargs rm -f
          cd "$OUTPUT"
          zip -r "${{ github.workspace }}/RemoteController-${{ steps.vars.outputs.version }}.zip" .

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: plugins-${{ steps.vars.outputs.version }}
          path: |
            ${{ github.workspace }}/CatalyticSerialPort-${{ steps.vars.outputs.version }}.zip
            ${{ github.workspace }}/CsvReporter-${{ steps.vars.outputs.version }}.zip
            ${{ github.workspace }}/SocketClient-${{ steps.vars.outputs.version }}.zip
            ${{ github.workspace }}/Interceptor-${{ steps.vars.outputs.version }}.zip
          retention-days: 14

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [check-tag, build, build-plugins]
    if: always() && needs.build.result == 'success' && needs.build-plugins.result == 'success'
    steps:
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ needs.check-tag.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Determine release type
        id: release_type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if echo "$VERSION" | grep -q 'dev'; then
            echo "draft=true" >> $GITHUB_OUTPUT
          else
            echo "draft=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Checkout for Release Notes
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: repo

      # 如果 RELEASE_NOTES.md 不存在就创建一个占位，防止 body_path 报错导致产物上传失败
      - name: Ensure RELEASE_NOTES.md exists
        run: |
          if [ ! -f repo/.github/RELEASE_NOTES.md ]; then
            mkdir -p repo/.github
            echo "Release ${{ steps.version.outputs.version }}" > repo/.github/RELEASE_NOTES.md
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: release-artifacts/**/*
          draft: ${{ steps.release_type.outputs.draft }}
          prerelease: false
          body_path: repo/.github/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear previous release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          PREV=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.draft == false and .tag_name != \"$CURRENT\")] | first | .id")
          if [ -n "$PREV" ] && [ "$PREV" != "null" ]; then
            gh api --method PATCH repos/${{ github.repository }}/releases/$PREV \
              -f body=""
          fi
        shell: bash
