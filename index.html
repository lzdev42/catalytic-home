<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalytic Home</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #79c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      color: #8b949e;
      margin-bottom: 2rem;
      max-width: 500px;
    }
    .badge {
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 9999px;
      padding: 0.4rem 1rem;
      font-size: 0.875rem;
      color: #58a6ff;
    }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    footer {
      margin-top: 4rem;
      color: #484f58;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Catalytic Home</h1>
    <p>Documentation & CI/CD hub for the Catalytic project.</p>
    <span class="badge">lzdev42 / catalytic-home</span>
    <footer>
      <p>Powered by <a href="https://pages.github.com">GitHub Pages</a></p>
    </footer>
  </div>
</body>
</html>
